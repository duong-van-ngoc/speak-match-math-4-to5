<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>speak-match-math-4-to5</title>
  <style>
    * {
      margin: 0 !important;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Background layers for smooth transitions */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
      z-index: 0;
    }

    .bg-layer.visible {
      opacity: 1;
    }

    #bg-layer-a {
      background-image: url('/assets/images/bg/background_speak.png');
      z-index: 0;
    }

    #bg-layer-b {
      z-index: 1;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .ui-btn {
      position: absolute;
      z-index: 9999;
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }

    /* Reset button: top right */
    #btn-reset {
      top: 2%;
      right: 2%;
    }

    .ui-btn:hover {
      transform: scale(1.12);
      transition: 0.15s;
    }
  </style>
</head>

<body>
  <div id="bg-layer-a" class="bg-layer visible"></div>
  <div id="bg-layer-b" class="bg-layer"></div>
  <div id="game-container"></div>
  <img id="btn-reset" class="ui-btn" src="/assets/images/ui/btn_reset.png" alt="Reset" />
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
